appId: com.formulavvd.desktop
productName: VVD 3.0

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

win:
  target: nsis
  icon: build/icon.ico

# Установщик: фирменный мастер с выбором папки и оформлением (sidebar/header
# с логотипом и маскотом). Авто-обновления применяются тихо (см. main.js
# quitAndInstall(isSilent=true)), поэтому полный мастер показывается только
# при первой установке, а обновления не дёргают пользователя.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VVD 3.0
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  installerHeader: build/installerHeader.bmp

artifactName: VVD-3.0-Setup-${version}.${ext}

# Источник авто-обновлений (electron-updater читает Releases этого репозитория)
publish:
  provider: github
  owner: electroniq45
  repo: vvd-desktop
