appId: com.formulavvd.desktop
productName: VVD 3.0

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

win:
  target: nsis
  icon: build/icon.ico

# Установщик: тихий режим (oneClick) - ставит и обновляет без вопросов о папке
# и пользователе; ярлыки на рабочем столе и в меню «Пуск» создаются автоматически.
nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VVD 3.0

artifactName: VVD-3.0-Setup-${version}.${ext}

# Источник авто-обновлений (electron-updater читает Releases этого репозитория)
publish:
  provider: github
  owner: electroniq45
  repo: vvd-desktop
